<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — AfriSteps</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
      align-items: start;
    }
    .cart-items-panel {
      background: white;
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }
    .cart-item {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      gap: 1rem;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 10px;
    }
    .cart-item-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .cart-item-meta { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.5rem; }
    .cart-item-price { font-weight: 700; color: var(--earth); }
    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .qty-btn-sm {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      background: var(--cream);
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qty-btn-sm:hover { background: var(--border); }
    .remove-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      margin-left: 0.5rem;
    }
    /* Summary */
    .order-summary {
      background: white;
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      position: sticky;
      top: 80px;
    }
    .order-summary h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      margin-bottom: 1.2rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--gold);
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.92rem;
      margin-bottom: 0.6rem;
      color: var(--text);
    }
    .summary-row.total {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark);
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
    }
    .promo-input {
      display: flex;
      gap: 0.5rem;
      margin: 1rem 0;
    }
    .promo-input input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
    }
    .empty-cart {
      text-align: center;
      padding: 4rem 2rem;
      grid-column: 1/-1;
    }
    .empty-cart .emoji { font-size: 4rem; margin-bottom: 1rem; }
    .empty-cart p { color: var(--muted); margin-bottom: 1.5rem; }

    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .order-summary { position: static; }
      .cart-item { grid-template-columns: 70px 1fr auto; gap: 0.75rem; }
      .cart-item img { width: 70px; height: 70px; }
      .cart-item-name { font-size: 0.9rem; }
      .promo-input { flex-direction: row; }
    }
  </style>
</head>
<body>
<header id="site-header"></header>

<div class="page-wrap">
  <div class="breadcrumb">
    <a href="index.html">Home</a> › Cart
  </div>
  <h1 class="section-title">Shopping Cart</h1>
  <p class="section-sub" id="cart-subtitle"></p>

  <div class="cart-layout" id="cart-layout">
    <div class="loading" style="grid-column:1/-1;">Loading cart…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>
  <p>© 2025 <span>AfriSteps</span> — Proudly made in Africa 🌍</p>
</footer>

<script src="shared.js"></script>
<script>
  document.getElementById("site-header").innerHTML = renderNav("cart");

  function renderCart() {
    const cart = getCart();
    const layout = document.getElementById("cart-layout");
    const subtitle = document.getElementById("cart-subtitle");
    subtitle.textContent = `${cart.length} item${cart.length !== 1 ? "s" : ""} in your cart`;

    if (!cart.length) {
      layout.innerHTML = `
        <div class="empty-cart">
          <div class="emoji">👟</div>
          <h2 style="font-family:'Playfair Display',serif;margin-bottom:0.5rem;">Your cart is empty</h2>
          <p>Looks like you haven't added any products yet.</p>
          <a href="shop.html" class="btn btn-primary">Continue Shopping →</a>
        </div>`;
      return;
    }

    const subtotal = cart.reduce((s, i) => s + parseFloat(i.price) * i.qty, 0);
    const activePromo = sessionStorage.getItem("as_promo");
    const discount = activePromo === "AFRICA10" ? subtotal * 0.1 : 0;
    const shipping = subtotal >= 50 ? 0 : 9.99;
    const total = subtotal - discount + shipping;

    layout.innerHTML = `
      <div class="cart-items-panel">
        <div id="cart-items"></div>
        <div style="margin-top:1rem;">
          <a href="shop.html" class="btn btn-outline">← Continue Shopping</a>
        </div>
      </div>
      <div class="order-summary">
        <h2>Order Summary</h2>
        <div class="summary-row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
        <div class="summary-row"><span>Delivery Fee</span><span>${shipping === 0 ? '<span style="color:#1a7d3e">FREE</span>' : '$' + shipping.toFixed(2)}</span></div>
        ${shipping > 0 ? `<div style="font-size:0.78rem;color:var(--muted);margin-bottom:0.5rem;">Add $${(50-subtotal).toFixed(2)} more for free delivery</div>` : ""}
        <div class="promo-input">
          <input type="text" placeholder="Promo code" id="promo-code" />
          <button class="btn btn-dark" style="font-size:0.82rem;" onclick="applyPromo()">Apply</button>
        </div>
        <div class="summary-row total"><span>Total</span><span>$${total.toFixed(2)}</span></div>
        <a href="checkout.html" class="btn btn-primary" style="width:100%;margin-top:1rem;padding:1rem;font-size:1rem;">Proceed to Checkout →</a>
        <div style="text-align:center;margin-top:1rem;font-size:0.8rem;color:var(--muted)">🔒 Secure checkout · SSL encrypted</div>
        <div style="text-align:center;margin-top:0.5rem;font-size:1.3rem;">💳 🛡️ 🌍</div>
      </div>`;

    const itemsDiv = document.getElementById("cart-items");
    itemsDiv.innerHTML = cart.map((item, idx) => `
      <div class="cart-item">
        <img src="${item.image}" alt="${item.name}" />
        <div>
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-meta">${item.category}${item.selectedSize ? " · Size " + item.selectedSize : ""}</div>
          <div class="cart-item-price">$${parseFloat(item.price).toFixed(2)}</div>
          <div class="cart-item-controls">
            <button class="qty-btn-sm" onclick="updateQty(${idx}, -1)">−</button>
            <span style="font-weight:600;min-width:24px;text-align:center">${item.qty}</span>
            <button class="qty-btn-sm" onclick="updateQty(${idx}, 1)">+</button>
            <button class="remove-btn" onclick="removeItem(${idx})">✕ Remove</button>
          </div>
        </div>
        <div style="font-weight:700;font-size:1rem;color:var(--dark)">
          $${(parseFloat(item.price) * item.qty).toFixed(2)}
        </div>
      </div>`).join("");
  }

  function updateQty(idx, delta) {
    const cart = getCart();
    cart[idx].qty = Math.max(1, cart[idx].qty + delta);
    saveCart(cart);
    renderCart();
  }

  function removeItem(idx) {
    const cart = getCart();
    cart.splice(idx, 1);
    saveCart(cart);
    renderCart();
    showToast("Item removed from cart");
  }

  function applyPromo() {
    const code = document.getElementById("promo-code").value.toUpperCase();
    if (code === "AFRICA10") showToast("🎉 10% discount applied!");
    else showToast("❌ Invalid promo code");
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }

  renderCart();
</script>
</body>
</html>
