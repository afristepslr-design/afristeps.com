<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — AfriSteps</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .product-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
    }
    .product-image-wrap {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: white;
    }
    .product-image-wrap img {
      width: 100%;
      height: 480px;
      object-fit: cover;
      display: block;
    }
    .product-info { padding: 1rem 0; }
    .product-category {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .product-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 1rem;
    }
    .product-price {
      font-size: 2rem;
      font-weight: 700;
      color: var(--earth);
      margin-bottom: 1.5rem;
    }
    .product-desc {
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 2rem;
      font-size: 0.97rem;
    }
    .label { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--dark); }
    .size-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .size-btn {
      padding: 0.4rem 0.85rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .size-btn:hover { border-color: var(--earth); }
    .size-btn.selected { border-color: var(--earth); background: var(--earth); color: white; font-weight: 600; }
    .qty-control {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 1.5rem;
      width: fit-content;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .qty-btn {
      width: 40px;
      height: 40px;
      background: var(--cream);
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .qty-btn:hover { background: var(--border); }
    .qty-val {
      width: 48px;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      background: white;
      outline: none;
    }
    .atc-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .stock-badge {
      display: inline-block;
      background: #e6f9ee;
      color: #1a7d3e;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.8rem;
      border-radius: 100px;
      margin-bottom: 1.5rem;
    }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .detail-row { display: flex; gap: 1rem; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .detail-label { color: var(--muted); width: 80px; flex-shrink: 0; }
    .detail-val { font-weight: 500; }

    /* Related */
    .related-section { margin-top: 4rem; }

    @media (max-width: 768px) {
      .product-detail { grid-template-columns: 1fr; gap: 1.5rem; }
      .product-image-wrap img { height: 260px; }
      .product-title { font-size: 1.6rem; }
      .product-price { font-size: 1.5rem; }
      .atc-row { flex-direction: column; }
      .atc-row .btn { width: 100%; justify-content: center; }
      .size-grid { gap: 0.4rem; }
    }
  </style>
</head>
<body>
<header id="site-header"></header>

<div class="page-wrap">
  <div class="breadcrumb">
    <a href="index.html">Home</a> › <a href="shop.html">Shop</a> › <span id="bc-name">Product</span>
  </div>

  <div id="product-detail" class="loading">Loading product…</div>

  <div class="related-section">
    <h2 class="section-title">You Might Also Like</h2>
    <p class="section-sub">More handcrafted African styles</p>
    <div class="products-grid" id="related-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>
  <p>© 2025 <span>AfriSteps</span> — Proudly made in Africa 🌍</p>
</footer>

<script src="shared.js"></script>
<script>
  document.getElementById("site-header").innerHTML = renderNav("shop");

  const params = new URLSearchParams(window.location.search);
  const productId = params.get("id");

  let selectedSize = "";
  let qty = 1;

  fetchProducts().then(products => {
    const product = products.find(p => p.id === productId) || products[0];
    document.getElementById("bc-name").textContent = product.name;
    document.title = `${product.name} — AfriSteps`;

    const sizes = (product.size || "").split(",").map(s => s.trim()).filter(Boolean);

    document.getElementById("product-detail").outerHTML = `
      <div class="product-detail">
        <div class="product-image-wrap">
          <img src="${product.image}" alt="${product.name}" />
        </div>
        <div class="product-info">
          <div class="product-category">${product.category}</div>
          <h1 class="product-title">${product.name}</h1>
          <div class="product-price">$${parseFloat(product.price).toFixed(2)} USD</div>
          <p class="product-desc">${product.description || "A beautiful handcrafted African slipper, made with authentic materials and traditional techniques."}</p>
          <div class="stock-badge">✔ In Stock — ${product.stock || "Ready"} units available</div>
          
          ${sizes.length ? `
          <div class="label">Size</div>
          <div class="size-grid" id="size-grid">
            ${sizes.map(s => `<button class="size-btn" onclick="selectSize('${s}',this)">${s}</button>`).join("")}
          </div>` : ""}

          <div class="label">Color: <span style="font-weight:400;color:var(--muted)">${product.color || "Multi"}</span></div>
          <br/>

          <div class="label">Quantity</div>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <span class="qty-val" id="qty-val">1</span>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>

          <div class="atc-row">
            <button class="btn btn-primary" style="flex:1;padding:1rem;" onclick="handleATC(${JSON.stringify(product).replace(/"/g,'&quot;')})">🛒 Add to Cart</button>
            <a href="cart.html" class="btn btn-dark" style="padding:1rem;">View Cart</a>
          </div>

          <hr class="divider" />
          <div class="detail-row"><span class="detail-label">Material</span><span class="detail-val">Natural leather & fabric</span></div>
          <div class="detail-row"><span class="detail-label">Origin</span><span class="detail-val">West Africa</span></div>
          <div class="detail-row"><span class="detail-label">Shipping</span><span class="detail-val">5–10 business days worldwide</span></div>
          <div class="detail-row"><span class="detail-label">Returns</span><span class="detail-val">30 days, no questions asked</span></div>
        </div>
      </div>`;

    // Related products
    const related = products.filter(p => p.id !== product.id && p.category === product.category).slice(0, 4);
    const relGrid = document.getElementById("related-grid");
    relGrid.innerHTML = related.map(p => `
      <div class="product-card" onclick="window.location='product.html?id=${p.id}'">
        <img src="${p.image}" alt="${p.name}" loading="lazy" />
        <div class="product-card-body">
          <div class="product-card-category">${p.category}</div>
          <div class="product-card-name">${p.name}</div>
          <div class="product-card-price">$${parseFloat(p.price).toFixed(2)}</div>
        </div>
        <div class="product-card-footer">
          <a href="product.html?id=${p.id}" class="btn btn-primary" style="flex:1;font-size:0.85rem;">View</a>
        </div>
      </div>`).join("") || "<p style='color:var(--muted)'>No related products found.</p>";
  });

  function selectSize(s, el) {
    selectedSize = s;
    document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("selected"));
    el.classList.add("selected");
  }

  function changeQty(delta) {
    qty = Math.max(1, qty + delta);
    document.getElementById("qty-val").textContent = qty;
  }

  function handleATC(product) {
    // If product has sizes, require one to be selected
    const hasSizes = (product.size || "").split(",").map(s => s.trim()).filter(Boolean).length > 0;
    if (hasSizes && !selectedSize) {
      showToast("⚠️ Please select a size first!");
      // Highlight the size grid
      const grid = document.getElementById("size-grid");
      if (grid) {
        grid.style.outline = "2px solid var(--accent)";
        grid.style.borderRadius = "8px";
        setTimeout(() => { grid.style.outline = "none"; }, 2000);
      }
      return;
    }
    addToCart({ ...product, selectedSize }, qty);
    showToast(`✅ ${product.name}${selectedSize ? " (Size " + selectedSize + ")" : ""} × ${qty} added to cart!`);

    // Reset qty to 1 but keep size selected so customer can easily add another size
    qty = 1;
    document.getElementById("qty-val").textContent = "1";
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }
</script>
</body>
</html>
